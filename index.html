<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur's Epic Journey - Multi-World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #a2d2ff; transition: background 5s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        #game-container {
            width: 100%; height: 420px; position: relative; margin-top: 20px;
            overflow: hidden; border-bottom: 25px solid #2ecc71;
            background: linear-gradient(to bottom, #a2d2ff, #cae9ff);
            transition: 5s;
        }

        /* Celestial Bodies */
        #moon { 
            position: absolute; top: 40px; right: 80px; width: 60px; height: 60px; 
            background: #f1c40f; border-radius: 50%; box-shadow: 0 0 20px #f1c40f; 
            display: none; z-index: 1;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle 1s infinite alternate; display: none; z-index: 0;
        }
        @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }

        /* Weather Effects */
        .snow {
            position: absolute; width: 5px; height: 5px; background: white;
            border-radius: 50%; top: -10px; z-index: 15;
            animation: snowFall 3s linear infinite;
        }
        @keyframes snowFall { to { transform: translateY(430px) translateX(20px); } }

        .rain {
            position: absolute; width: 2px; height: 15px; background: rgba(255,255,255,0.6);
            top: -20px; z-index: 15; animation: fall 0.5s linear infinite;
        }
        @keyframes fall { to { transform: translateY(430px); } }

        /* Character */
        #player { width: 50px; height: 60px; position: absolute; bottom: 0; left: 60px; z-index: 100; transition: bottom 0.1s; }
        .human .head { width: 22px; height: 22px; background: #FFDBAC; border-radius: 50%; position: absolute; top: 0; left: 14px; }
        .human .body { width: 24px; height: 28px; background: #3498db; position: absolute; top: 22px; left: 13px; border-radius: 5px; color: white; font-size: 9px; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .penguin .body { width: 35px; height: 45px; background: black; border-radius: 50% 50% 40% 40%; position: absolute; bottom: 10px; left: 8px; }
        .penguin .stomach { width: 22px; height: 28px; background: white; border-radius: 50%; position: absolute; bottom: 15px; left: 14px; }
        
        .leg { width: 8px; height: 12px; background: #333; position: absolute; bottom: 0; }
        .leg1 { left: 15px; animation: run 0.4s infinite; }
        .leg2 { left: 27px; animation: run 0.4s infinite reverse; }
        @keyframes run { 0%, 100% { transform: rotate(-30deg); } 50% { transform: rotate(30deg); } }
        .jump { animation: jump-anim 0.6s cubic-bezier(0.1, 0.4, 0.4, 1); }
        @keyframes jump-anim { 0%, 100% { bottom: 0; } 50% { bottom: 160px; } }

        /* Obstacles */
        #obstacle { position: absolute; bottom: 0; right: -60px; z-index: 11; }
        .tree-style::after { content: '🌳'; font-size: 45px; position: absolute; top: -45px; left: -15px; }
        .rock-style { width: 45px; height: 28px; background: #7f8c8d; border-radius: 50% 50% 10% 10%; border: 2px solid #555; }

        /* UI */
        #stats { font-size: 24px; font-weight: bold; padding: 10px; color: #2c3e50; }
        .controls { display: flex; gap: 20px; margin: 20px; }
        .btn { width: 80px; height: 80px; background: #fff; border: 4px solid #333; border-radius: 50%; font-size: 35px; display: flex; justify-content: center; align-items: center; cursor: pointer; user-select: none; box-shadow: 0 5px #999; }
        .btn:active { box-shadow: 0 2px #666; transform: translateY(3px); }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
    </style>
</head>
<body onkeydown="if(event.code==='Space') triggerJump()">

    <div id="stats">Level: 1 | Score: 0 | World: Day Forest</div>

    <div id="game-container">
        <div id="moon"></div>
        <div id="stars-container"></div>
        
        <div id="overlay">
            <h1>NUR'S ADVENTURE</h1>
            <p>Select Character & Start</p>
            <div style="margin: 15px;">
                <button onclick="setChar('human')" style="padding: 10px 20px; cursor: pointer;">Human</button>
                <button onclick="setChar('penguin')" style="padding: 10px 20px; cursor: pointer;">Penguin</button>
            </div>
            <button onclick="startGame()" style="padding: 15px 40px; background: #f39c12; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 20px;">START GAME 🎵</button>
        </div>

        <div id="player" class="human">
            <div id="char-content"><div class="head"></div><div class="body">Nur</div></div>
            <div class="leg leg1"></div><div class="leg leg2"></div>
        </div>
        <div id="obstacle" class="tree-style"></div>
    </div>

    <div class="controls">
        <div class="btn" onclick="triggerJump()">⬆️</div>
        <div class="btn" onclick="triggerJump()">Jump</div>
    </div>

    <script>
        const container = document.getElementById("game-container");
        const player = document.getElementById("player");
        const obstacle = document.getElementById("obstacle");
        const stats = document.getElementById("stats");
        const overlay = document.getElementById("overlay");
        const moon = document.getElementById("moon");
        const starsContainer = document.getElementById("stars-container");

        let score = 0, level = 1, speed = 5, isAlive = false, charType = 'human';
        let worldType = "Day Forest";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // তারা তৈরি
        for(let i=0; i<50; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 60 + '%';
            s.style.width = s.style.height = Math.random() * 3 + 'px';
            s.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(s);
        }

        function setChar(type) {
            charType = type;
            player.className = type;
            document.getElementById("char-content").innerHTML = type === 'human' ? 
                '<div class="head"></div><div class="body">Nur</div>' : 
                '<div class="body"></div><div class="stomach"></div>';
        }

        function playSound(f, t, d, v) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function playMusic() {
            if(!isAlive) return;
            playSound(200, 'square', 0.4, 0.05);
            setTimeout(() => { if(isAlive) playSound(250, 'square', 0.4, 0.05); }, 300);
            setTimeout(playMusic, 600);
        }

        function startGame() {
            isAlive = true; score = 0; level = 1; speed = 5;
            overlay.style.display = "none";
            playMusic();
            requestAnimationFrame(update);
        }

        function updateWorld() {
            const stars = document.querySelectorAll('.star');
            // প্রতি ৫ লেভেল পর পর দৃশ্য পরিবর্তন
            if (level % 4 === 1) { // দিন
                worldType = "Day Forest";
                container.style.background = "linear-gradient(#a2d2ff, #cae9ff)";
                moon.style.display = "none";
                stars.forEach(s => s.style.display = "none");
            } else if (level % 4 === 2) { // বিকেল
                worldType = "Sunset Valley";
                container.style.background = "linear-gradient(#ff9f43, #ff6b6b)";
            } else if (level % 4 === 3) { // রাত
                worldType = "Night Desert";
                container.style.background = "linear-gradient(#2c3e50, #000000)";
                moon.style.display = "block";
                stars.forEach(s => s.style.display = "block");
                if(Math.random() > 0.7) spawnRain('rain'); // রাতে মাঝে মাঝে বৃষ্টি
            } else { // বরফ/শীতকাল
                worldType = "Snowy Mountain";
                container.style.background = "linear-gradient(#dff9fb, #ffffff)";
                moon.style.display = "none";
                stars.forEach(s => s.style.display = "none");
                spawnRain('snow'); // বরফ পড়া
            }
        }

        function spawnRain(type) {
            for(let i=0; i<5; i++) {
                let r = document.createElement('div');
                r.className = type;
                r.style.left = Math.random() * 100 + '%';
                r.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                container.appendChild(r);
                setTimeout(() => r.remove(), 2000);
            }
        }

        function triggerJump() {
            if (isAlive && !player.classList.contains("jump")) {
                player.classList.add("jump");
                playSound(300, 'sine', 0.2, 0.3);
                setTimeout(() => playSound(260, 'sine', 0.2, 0.3), 150);
                setTimeout(() => player.classList.remove("jump"), 600);
            }
        }

        function update() {
            if (!isAlive) return;

            let obsRight = parseInt(window.getComputedStyle(obstacle).getPropertyValue("right"));
            obstacle.style.right = (obsRight + speed) + "px";

            if (obsRight > window.innerWidth) {
                obstacle.style.right = "-60px";
                score += 10;
                if(score % 50 === 0) { // প্রতি ৫০ স্কোরে লেভেল আপ (৫ বাধা পর পর)
                    level++;
                    speed += 0.5;
                    updateWorld();
                }
                stats.innerText = `Level: ${level} | Score: ${score} | ${worldType}`;
                obstacle.className = Math.random() > 0.5 ? "tree-style" : "rock-style";
            }

            let pBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
            let oRect = obstacle.getBoundingClientRect();
            let pRect = player.getBoundingClientRect();

            if (oRect.left < pRect.right - 15 && oRect.right > pRect.left + 15 && pBottom < 25) {
                isAlive = false;
                alert(`গেম ওভার! \nলেভেল: ${level} \nস্কোর: ${score}`);
                location.reload();
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
