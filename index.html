<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur's Game with Buttons</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            background: #87CEEB; 
            transition: background 5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Game Container */
        #game-container {
            width: 100%;
            height: 350px;
            position: relative;
            margin-top: 20px;
            overflow: hidden;
            border-bottom: 15px solid #2ecc71;
            background: linear-gradient(#87CEEB, #b1e4f7);
        }

        /* Score & Celestial */
        #score { font-size: 28px; margin-top: 10px; font-weight: bold; color: #2c3e50; }
        #celestial {
            position: absolute; top: 30px; right: 80px;
            width: 50px; height: 50px; background: #f1c40f;
            border-radius: 50%; box-shadow: 0 0 20px #f1c40f; transition: 5s;
        }

        /* Clouds & Birds */
        .cloud {
            position: absolute; width: 80px; height: 30px; background: #fff;
            border-radius: 50px; opacity: 0.8; animation: cloudMove 25s linear infinite;
        }
        .bird {
            position: absolute; width: 15px; height: 8px; border-top: 2px solid #333;
            border-radius: 50% 50% 0 0; animation: birdFly 12s linear infinite;
        }

        @keyframes cloudMove { from { left: -100px; } to { left: 100%; } }
        @keyframes birdFly { from { right: -50px; } to { right: 100%; } }

        /* Character Nur */
        #player { width: 40px; height: 60px; position: absolute; bottom: 0; left: 50px; z-index: 5; }
        .head { width: 22px; height: 22px; background: #FFDBAC; border-radius: 50%; position: absolute; top: 0; left: 9px; }
        .hair { width: 24px; height: 10px; background: #000; border-radius: 10px 10px 0 0; position: absolute; top: -2px; left: 8px; }
        .body { 
            width: 22px; height: 26px; background: #3498db; position: absolute; top: 22px; left: 9px; 
            border-radius: 4px; display: flex; justify-content: center; align-items: center; 
            color: white; font-size: 9px; font-weight: bold; 
        }
        .leg { width: 7px; height: 15px; background: #34495e; position: absolute; bottom: 0; }
        .leg1 { left: 9px; animation: walk 0.4s infinite; }
        .leg2 { left: 24px; animation: walk 0.4s infinite reverse; }

        @keyframes walk { 0%, 100% { transform: rotate(-25deg); } 50% { transform: rotate(25deg); } }
        .jump { animation: jump-anim 0.5s linear; }
        @keyframes jump-anim { 0%, 100% { bottom: 0; } 50% { bottom: 130px; } }

        /* Tree */
        #tree { width: 15px; height: 25px; background: #8B4513; position: absolute; bottom: 0; right: -100px; }
        #tree::before { content: ''; width: 30px; height: 30px; background: #27ae60; border-radius: 50%; position: absolute; top: -20px; left: -8px; }

        /* Control Buttons */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: #fff;
            border: 3px solid #34495e;
            border-radius: 50%;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px #95a5a6;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 0px #95a5a6; background: #ecf0f1; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 20; }
        #startBtn { padding: 15px 40px; font-size: 24px; cursor: pointer; background: #f1c40f; border: none; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="score">Score: 0</div>

    <div id="game-container">
        <div id="celestial"></div>
        <div class="cloud" style="top: 20px; animation-duration: 30s;"></div>
        <div class="bird" style="top: 80px; animation-duration: 15s;"></div>

        <div id="overlay">
            <button id="startBtn" onclick="startGame(event)">START GAME 🏃‍♂️</button>
        </div>

        <div id="player">
            <div class="hair"></div>
            <div class="head"></div>
            <div class="body">Nur</div>
            <div class="leg leg1"></div>
            <div class="leg leg2"></div>
        </div>

        <div id="tree"></div>
    </div>

    <div class="controls">
        <div class="btn" onclick="triggerJump()">⬆️</div>
        <div class="btn" onclick="triggerJump()">⬇️</div>
    </div>

    <script>
        const player = document.getElementById("player");
        const tree = document.getElementById("tree");
        const scoreBoard = document.getElementById("score");
        const overlay = document.getElementById("overlay");
        const celestial = document.getElementById("celestial");

        let score = 0;
        let speed = 6;
        let isAlive = false;
        let isNight = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function startGame(e) {
            e.stopPropagation();
            isAlive = true; score = 0; speed = 6;
            scoreBoard.innerText = "Score: 0";
            overlay.style.display = "none";
            requestAnimationFrame(update);
            setInterval(cycleDayNight, 15000); 
        }

        function cycleDayNight() {
            if(!isAlive) return;
            isNight = !isNight;
            if(isNight) {
                document.body.style.background = "#2c3e50";
                celestial.style.background = "#ecf0f1";
                celestial.style.boxShadow = "0 0 20px #ecf0f1";
            } else {
                document.body.style.background = "#87CEEB";
                celestial.style.background = "#f1c40f";
                celestial.style.boxShadow = "0 0 20px #f1c40f";
            }
        }

        function triggerJump() {
            if (isAlive && !player.classList.contains("jump")) {
                player.classList.add("jump");
                playTone(400, 'square', 0.1);
                setTimeout(() => player.classList.remove("jump"), 500);
            }
        }

        // কীবোর্ড কন্ট্রোল (Space বা Up Arrow)
        window.addEventListener("keydown", (e) => {
            if(e.code === "Space" || e.code === "ArrowUp") triggerJump();
        });

        function update() {
            if (!isAlive) return;

            let treeRight = parseInt(window.getComputedStyle(tree).getPropertyValue("right"));
            tree.style.right = (treeRight + speed) + "px";

            if (treeRight > window.innerWidth) {
                tree.style.right = "-50px";
                score++;
                scoreBoard.innerText = "Score: " + score;
                speed += 0.4;
            }

            let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));
            let treeRect = tree.getBoundingClientRect();
            let playerRect = player.getBoundingClientRect();

            if (treeRect.left < playerRect.right - 10 && treeRect.right > playerRect.left + 10 && playerBottom < 30) {
                isAlive = false;
                playTone(100, 'sawtooth', 0.5);
                alert("গেম ওভার, নূর! স্কোর: " + score);
                location.reload();
            }
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
